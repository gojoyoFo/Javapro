name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Install NDK
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" \
            "cmake;3.22.1"

      - name: Grant execute permission to Gradle
        run: chmod +x gradlew

      - name: Check keystore
        run: ls -l javapro-release.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=javapro-release.jks
          storePassword=javapro123
          keyAlias=mykey
          keyPassword=javapro123
          EOF

      - name: Clean Gradle cache
        run: ./gradlew clean

      - name: Build APK (Release)
        run: ./gradlew assembleRelease --no-build-cache --rerun-tasks

      - name: Debug - Find fps_core binary
        if: always()
        run: |
          echo "=== Searching for fps_core binary ==="
          find app/build -name "fps_core" 2>/dev/null || echo "Not found in build/"
          find app/.cxx  -name "fps_core" 2>/dev/null || echo "Not found in .cxx/"
          echo "=== CMake output dirs ==="
          find app/build/intermediates/cmake -type f 2>/dev/null | head -20 || echo "No cmake intermediates"
          echo "=== Assets dir ==="
          ls app/src/main/assets/ 2>/dev/null || echo "Assets dir empty or missing"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
